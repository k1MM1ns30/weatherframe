<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WeatherFrame</title>
  <link rel="stylesheet" href="index.css">
</head>

<body>

  <main class="canvas" id="captureArea">

    <div class="weather-emoji" id="weatherEmoji">☀️</div>

    <div class="camera-frame">
      <div id="p5-container"></div>
    </div>

    <div class="info" id="weather">
      Loading...
    </div>

    <button id="captureBtn">Capture</button>

    <div class="city-wrapper">
      <button id="mapToggle">🗺️</button>

      <div class="city-buttons" id="cityButtons">
        <button class="city-btn" data-city="New York">New York</button>
        <button class="city-btn" data-city="Tokyo">Tokyo</button>
        <button class="city-btn" data-city="Seoul">Seoul</button>
        <button class="city-btn" data-city="Okinawa">Okinawa</button>
        <button class="city-btn" data-city="London">London</button>
        <button class="city-btn" data-city="Sydney">Australia</button>
      </div>
    </div>

    <div class="filter-wrapper">
      <button id="filterToggle">🌟</button>

      <div id="filterButtons" class="filter-buttons">
        <button class="filter-btn" data-filter="live">LIVE</button>
        <button class="filter-btn" data-filter="sunny">SUNNY</button>
        <button class="filter-btn" data-filter="cloudy">CLOUDY</button>
        <button class="filter-btn" data-filter="rain">RAIN</button>
        <button class="filter-btn" data-filter="windy">WINDY</button>
        <button class="filter-btn" data-filter="hot">HOT</button>
        <button class="filter-btn" data-filter="cold">COLD</button>
        <button class="filter-btn" data-filter="snow">SNOW</button>
        <button class="filter-btn" data-filter="fog">FOG</button>
      </div>
    </div>

  </main>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
  <script src="index.js?v=2"></script>

</body>
</html>
